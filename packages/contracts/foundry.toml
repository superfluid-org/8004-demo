[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "poc-ccip-8004/=lib/poc-ccip-8004/packages/contracts/",
]

# Deploy profile: pre-linked library addresses (Base Sepolia)
# Usage: FOUNDRY_PROFILE=deploy forge script ...
[profile.deploy]
libraries = [
    "lib/poc-ccip-8004/packages/contracts/src/Lib8004ScoreCCIPViewer.sol:Lib8004ScoreCCIPViewer:0x08022410902dcf03b5e8211472cfa8d25b6162a2"
]

[lint]
lint_on_build = false

[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
